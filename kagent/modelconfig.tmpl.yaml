#   apiKeySecret: ${LLM_SECRET_NAME}
#   apiKeySecretKey: ${LLM_SECRET_KEY}
#   openAI:
#     baseUrl: ${LLM_ENDPOINT}   # e.g. https://api.openai.com/v1
